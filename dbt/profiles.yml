social_media_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('NEON_HOST') }}"
      user: "{{ env_var('NEON_USER') }}"
      password: "{{ env_var('NEON_PASSWORD') }}"
      port: 5432
      dbname: "{{ env_var('NEON_DBNAME') }}"
      schema: public
      threads: 4
      sslmode: require
      keepalives_idle: 0
